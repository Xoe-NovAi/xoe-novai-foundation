name: Secret Scanning & Compliance

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    name: Detect Secrets & Credentials
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --json

      - name: Pre-commit Hooks
        uses: pre-commit/action@v3

      - name: Report Secrets
        if: failure()
        run: |
          echo "⚠️ Potential secrets detected in commit"
          echo "Actions:"
          echo "1. Do NOT push this code"
          echo "2. Run: git reset --soft HEAD~1"
          echo "3. Remove secrets and re-commit"
          exit 1
