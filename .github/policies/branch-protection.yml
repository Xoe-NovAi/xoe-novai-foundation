# Branch Protection Rules for Omega-Stack
# 
# This file defines the branch protection rules for the Omega-Stack repository
# based on the GitHub Management Strategy.

# Main branch protection
main:
  required_reviews: 2
  dismiss_stale_reviews: true
  require_code_owner_reviews: true
  required_status_checks:
    strict: true
    contexts:
      - "ci/tests"
      - "ci/security-scan"
      - "ci/performance-benchmarks"
      - "ci/integration-tests"
  enforce_admins: true
  required_linear_history: true
  allow_force_pushes: false
  allow_deletions: false
  required_conversation_resolution: true

# Develop branch protection
develop:
  required_reviews: 1
  dismiss_stale_reviews: true
  require_code_owner_reviews: false
  required_status_checks:
    strict: true
    contexts:
      - "ci/tests"
      - "ci/security-scan"
  enforce_admins: false
  required_linear_history: false
  allow_force_pushes: false
  allow_deletions: false
  required_conversation_resolution: true

# Feature branch protection
feature/*:
  required_reviews: 1
  dismiss_stale_reviews: true
  require_code_owner_reviews: false
  required_status_checks:
    strict: true
    contexts:
      - "ci/tests"
  enforce_admins: false
  required_linear_history: false
  allow_force_pushes: true
  allow_deletions: true
  required_conversation_resolution: false

# Research branch protection
research/*:
  required_reviews: 1
  dismiss_stale_reviews: true
  require_code_owner_reviews: false
  required_status_checks:
    strict: false
    contexts:
      - "ci/tests"
  enforce_admins: false
  required_linear_history: false
  allow_force_pushes: true
  allow_deletions: true
  required_conversation_resolution: false

# Agent branch protection
agent/*:
  required_reviews: 1
  dismiss_stale_reviews: true
  require_code_owner_reviews: false
  required_status_checks:
    strict: false
    contexts:
      - "ci/tests"
  enforce_admins: false
  required_linear_history: false
  allow_force_pushes: true
  allow_deletions: true
  required_conversation_resolution: false

# Wave branch protection
wave/*:
  required_reviews: 2
  dismiss_stale_reviews: true
  require_code_owner_reviews: true
  required_status_checks:
    strict: true
    contexts:
      - "ci/tests"
      - "ci/security-scan"
      - "ci/performance-benchmarks"
  enforce_admins: true
  required_linear_history: true
  allow_force_pushes: false
  allow_deletions: false
  required_conversation_resolution: true

# Hotfix branch protection
hotfix/*:
  required_reviews: 2
  dismiss_stale_reviews: true
  require_code_owner_reviews: true
  required_status_checks:
    strict: true
    contexts:
      - "ci/tests"
      - "ci/security-scan"
  enforce_admins: true
  required_linear_history: true
  allow_force_pushes: false
  allow_deletions: false
  required_conversation_resolution: true

# Code Owner Configuration
codeowners:
  files:
    - "app/**" : "@omega-stack/core-team"
    - "tests/**" : "@omega-stack/test-team"
    - "docs/**" : "@omega-stack/docs-team"
    - "scripts/**" : "@omega-stack/devops-team"
    - ".github/**" : "@omega-stack/devops-team"
    - "config.toml" : "@omega-stack/core-team"
    - "pyproject.toml" : "@omega-stack/core-team"
    - "requirements*.txt" : "@omega-stack/core-team"
    - "memory_bank/**" : "@omega-stack/knowledge-team"

# Review Requirements
review_requirements:
  minimum_reviews: 1
  maximum_reviews: 5
  review_timeout: 7 # days
  auto_dismiss_stale_reviews: true
  require_review_from_code_owner: true

# Status Check Requirements
status_check_requirements:
  required_checks:
    - "ci/tests"
    - "ci/security-scan"
    - "ci/performance-benchmarks"
    - "ci/integration-tests"
  optional_checks:
    - "ci/documentation"
    - "ci/memory-bank-update"
  check_timeout: 30 # minutes
  strict_status_checks: true

# Merge Requirements
merge_requirements:
  allow_merge_commits: false
  allow_squash_commits: true
  allow_rebase_commits: true
  delete_branch_on_merge: true
  required_signatures: true
  linear_history: true

# Security Requirements
security_requirements:
  require_signed_commits: true
  require_commit_signatures: true
  block_force_pushes: true
  block_deletions: true
  require_conversation_resolution: true

# Automation Rules
automation_rules:
  auto_assign_reviewers: true
  auto_request_code_owner_reviews: true
  auto_merge_on_approval: false
  auto_close_stale_prs: true
  stale_pr_days: 30
  auto_delete_branch_after_merge: true