# ============================================================================ 
# XNAi Foundation Stack - SESS-26 MARATHON HARDENED (LOW-RAM)
# ============================================================================ 
# Purpose: Autonomous Marathon Core Mesh.
# Optimized for: Stability, Resource Preservation, and Ingestion.
# Hardening: Zero-Build, Hidden Port Isolation, Strict RAM Gating.
# ============================================================================ 

services:
  # ==========================================================================
  # CONSUL SERVICE - Service Discovery
  # ==========================================================================
  consul:
    image: consul:1.15.4
    container_name: xnai_consul
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    volumes:
      - ./data/consul:/consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - xnai_db_network
    restart: unless-stopped

  # ==========================================================================
  # REDIS SERVICE - Cache & Streams Coordinator
  # ==========================================================================
  redis:
    image: redis:7.4.1
    container_name: xnai_redis
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --port 0
      --tls-port 6379
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients no
    volumes:
      - ./data/redis:/data
      - ./tls:/tls
    environment:
      - REDIS_PASSWORD
      - REDIS_STREAM_MAX_LEN=${REDIS_STREAM_MAX_LEN:-1000}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli --tls --cacert /tls/ca.crt -a \"$REDIS_PASSWORD\" ping || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
    networks:
      - xnai_db_network
    restart: unless-stopped

  # ==========================================================================
  # POSTGRESQL SERVICE - Persistence
  # ==========================================================================
  postgres:
    image: postgres:15
    container_name: xnai_postgres
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: xnai
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - xnai_db_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD","pg_isready","-U","postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # QDRANT SERVICE - Vector Database
  # ==========================================================================
  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: xnai_qdrant
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    volumes:
      - ./data/qdrant:/qdrant/storage
      - ./config/qdrant_config.yaml:/qdrant/config/config.yaml,U
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_HOST=0.0.0.0
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - xnai_db_network
    restart: unless-stopped

  # ==========================================================================
  # RAG SERVICE - FastAPI Backend (Pre-built)
  # ==========================================================================
  rag:
    image: localhost/xnai-rag:latest
    container_name: xnai_rag_api
    init: true
    user: "100999:100999"
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '2.0'
    volumes:
      - /media/arcana-novai/omega_library/omega-stack/cache/huggingface:/home/appuser/.cache/huggingface
      - ../../library:/library
      - ../../expert-knowledge:/knowledge
      - ./tls/ca.crt:/tls/ca.crt
      - ../../app/config.toml:/app/config.toml,U
      - /media/arcana-novai/omega_library/omega-stack/models:/models,U
      - /media/arcana-novai/omega_library/omega-stack/embeddings:/embeddings,U
    environment:
      - LLM_MODEL_PATH=/models/Qwen3-0.6B-Q6_K.gguf
      - EMBEDDING_MODEL_PATH=/embeddings/embeddinggemma-300m-Q6_K.gguf
      - REDIS_HOST=xnai_redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS_ENABLED=true
      - REDIS_CA_CERT_PATH=/tls/ca.crt
      - REDIS_SSL_CERT_REQS=none
      - POSTGRES_HOST=xnai_postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=xnai
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - CONFIG_PATH=/app/config.toml
      - PYTHONPATH=/app
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    networks:
      - xnai_db_network
      - xnai_app_network
    restart: unless-stopped
    command: ["uvicorn", "XNAi_rag_app.api.entrypoint:app", "--host", "0.0.0.0", "--port", "8012"]

  # ==========================================================================
  # OIKOS SERVICE - Mastermind (Pre-built)
  # ==========================================================================
  oikos:
    image: localhost/xnai-rag:latest
    container_name: xnai_oikos
    init: true
    user: "1000:1000"
    volumes:
      - ../../app:/app/app:Z
      - ../../scripts:/app/scripts:Z
      - ../../memory_bank:/app/memory_bank:Z
      - ../../config.toml:/app/config.toml
    environment:
      - REDIS_PASSWORD
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONFIG_PATH=/app/config.toml
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    networks:
      - xnai_db_network
      - xnai_app_network
    restart: unless-stopped

  # ==========================================================================
  # CADDY SERVICE - Unified Gateway
  # ==========================================================================
  caddy:
    image: caddy:2.8-alpine
    container_name: xnai_caddy
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile,U
      - ./logs/caddy:/var/log/caddy
    networks:
      - xnai_app_network
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================================================
  # MEMORY BANK MCP - Gnostic Layer (Pre-built)
  # ==========================================================================
  memory-bank-mcp:
    image: localhost/docker_memory-bank-mcp:latest
    container_name: xnai_memory_bank_mcp
    init: true
    user: "1000:1000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@xnai_postgres:5432/xnai
      - REDIS_URL=rediss://xnai_redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - STORAGE_PATH=/storage
      - CONFIG_PATH=/app/config.toml
    volumes:
      - ../../storage:/storage
      - ./tls/ca.crt:/tls/ca.crt
      - ../../app/config.toml:/app/config.toml,U
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks:
      - xnai_db_network
      - xnai_app_network
    restart: unless-stopped

  # ==========================================================================
  # CURATION WORKER - Ingestion Engine (Pre-built)
  # ==========================================================================
  curation_worker:
    image: localhost/xnai-curation-worker:latest
    container_name: xnai_library_curator
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 1.5G
    environment:
      - REDIS_HOST=xnai_redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@xnai_postgres:5432/xnai
      - PYTHONPATH=/app
      - CONFIG_PATH=/app/config.toml
    volumes:
      - ../../storage:/storage
      - ../../library:/library
      - ../../expert-knowledge:/expert-knowledge
      - ../../app/config.toml:/app/config.toml,U
    networks:
      - xnai_db_network
    command: ["python3", "-m", "XNAi_rag_app.workers.library_curator"]

networks:
  xnai_db_network:
    name: xnai_db_network
    internal: true
  xnai_app_network:
    name: xnai_app_network

volumes:
  huggingface_cache: { name: xnai_huggingface_cache }
