# ============================================================================ 
# XNAi Foundation Stack - Phase 1 v0.1.7 (BuildKit Optimized)
# ============================================================================ 
# Purpose: Multi-service orchestration for the XNAi Foundation Stack.
# Optimized for: AMD Ryzen 5700U (Zen 2) | 8 Cores / 16 Threads
# Hardening: Zero-Trust, Rootless Podman, Maat Ethical Guardrails.
# ============================================================================ 

services:
  # ==========================================================================
  # CONSUL SERVICE - Service Discovery & Health Monitoring
  # ==========================================================================
  consul:
    image: consul:1.15.4
    userns_mode: keep-id
    container_name: xnai_consul
    init: true
    user: "1000:1000"
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    volumes:
      - ./data/consul:/consul/data:Z,U
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - xnai_db_network
    restart: unless-stopped

  # ==========================================================================
  # REDIS SERVICE - Cache & Streams Coordinator
  # ==========================================================================
  redis:
    image: redis:7.4.1
    container_name: xnai_redis
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --port 0
      --tls-port 6379
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients no
    volumes:
      - ./data/redis:/data:Z,U
      - ./tls:/tls:ro,Z
    environment:
      - REDIS_PASSWORD
      - REDIS_STREAM_MAX_LEN=${REDIS_STREAM_MAX_LEN:-1000}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli --tls --cacert /tls/ca.crt -a \"$REDIS_PASSWORD\" ping || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - xnai_db_network
    restart: unless-stopped

  # ==========================================================================
  # OIKOS SERVICE - Cognitive Mesh & Mastermind Orchestrator
  # ==========================================================================
  oikos:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.oikos
    container_name: xnai_oikos
    init: true
    user: "1000:1000"
    ports:
      - "8006:8006"
    volumes:
      - ../../app:/app/app:Z
      - ../../scripts:/app/scripts:Z
      - ../../memory_bank:/app/memory_bank:Z
      - ../../.cli:/app/.cli:Z
      - ../../.logs:/app/.logs:Z
      - ../../.env:/app/.env:ro,Z
      - ../../config.toml:/app/config.toml:ro,Z
      - ../../config:/app/config:ro,Z
      - /home/arcana-novai/.xnai/oauth_credentials.json:/app/secrets/oauth_credentials.json:ro,Z
      - /home/arcana-novai/.xnai/.oauth_key:/app/secrets/.oauth_key:ro,Z
    environment:
      - REDIS_PASSWORD
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY
      - GOOGLE_API_KEY
      - XNAI_OAUTH_KEY
      - VERTEXAI_PROJECT=arcana-novai-gemini-1772727596
      - VERTEXAI_LOCATION=us-central1
      - CONFIG_PATH=/app/config.toml
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - xnai_db_network
      - xnai_app_network
    restart: unless-stopped

  # ==========================================================================
  # VICTORIAMETRICS SERVICE - Time-Series Metrics Storage
  # ==========================================================================
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: xnai_victoriametrics
    init: true
    user: "1000:1000"
    ports:
      - "8428:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data:Z
      - ./configs/victoriametrics:/etc/victoriametrics:ro,Z,U
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=365d"
      - "-httpListenAddr=:8428"
      - "-memory.allowedPercent=80"
      - "-search.maxSeries=1000000"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8428/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - xnai_db_network
    restart: unless-stopped

  # ==========================================================================
  # OPENPIPE SERVICE - LLM Optimization Layer
  # ==========================================================================
  openpipe:
    image: python:3.12-slim
    container_name: xnai_openpipe
    init: true
    user: "1000:1000"
    command: ["python3", "-c", "import time; print('OpenPipe Sovereign Collector Active'); time.sleep(float('inf'))"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    ports:
      - "3001:3000"
    volumes:
      - ./config/openpipe-config.yaml:/app/config/config.yaml:ro,Z,U
      - ./data/openpipe:/app/data:Z,U
      - ./logs/openpipe:/app/logs:Z,U
    environment:
      - OPENPIPE_API_KEY=${OPENPIPE_API_KEY:-}
      - REDIS_URL=rediss://:${REDIS_PASSWORD}@redis:6379/0
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/xnai
      - CACHE_TTL=${OPENPIPE_CACHE_TTL:-300}
      - DEDUPLICATION_WINDOW=${OPENPIPE_DEDUPLICATION_WINDOW:-60}
      - METRICS_ENABLED=true
      - SOVEREIGN_MODE=${OPENPIPE_SOVEREIGN_MODE:-true}
      - MEMORY_BUDGET_GB=1.0
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - xnai_db_network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # ==========================================================================
  # QDRANT SERVICE - Vector Database (Phase 3)
  # ==========================================================================
  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: xnai_qdrant
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage:Z,U
      - ./config/qdrant_config.yaml:/qdrant/config/config.yaml:ro,Z,U
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_HOST=0.0.0.0
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - QDRANT_SNAPSHOT_RECOVERY=true
      - QDRANT__STORAGE__ON_DISK=true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - xnai_db_network
    restart: unless-stopped

  # ==========================================================================
  # POSTGRESQL SERVICE - Optional Hybrid GraphRAG storage
  # ==========================================================================
  postgres:
    image: postgres:15
    container_name: xnai_postgres
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: xnai
    volumes:
      - ./data/postgres:/var/lib/postgresql/data:Z,U
    ports:
      - "5432:5432"
    networks:
      - xnai_db_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD","pg_isready","-U","postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ==========================================================================
  # RAG SERVICE - FastAPI Backend (Ryzen Tuned)
  # ==========================================================================
  rag:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    image: xnai-rag:latest
    container_name: xnai_rag_api
    init: true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '1.0'
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /var/run:size=64m,mode=0755
      - /app/.cache:size=100m,mode=0755
      - /app/logs:size=100m,mode=1777
      - /app/data:size=50m,mode=1777
    volumes:
      - /media/arcana-novai/omega_library/omega-stack/cache/huggingface:/home/appuser/.cache/huggingface:Z,U
      - ../../library:/library:z,U
      - ../../expert-knowledge:/knowledge:z,U
      - ./tls/ca.crt:/tls/ca.crt:ro,Z
      - ../../app/config.toml:/app/config.toml:ro,Z,U
      - /media/arcana-novai/omega_library/omega-stack/models:/models:ro,Z,U
      - /media/arcana-novai/omega_library/omega-stack/embeddings:/embeddings:ro,Z,U
    ports:
      - "8000:8002"
    environment:
      - OPENBLAS_CORETYPE=ZEN
      - OPENBLAS_NUM_THREADS=6
      - LLAMA_CPP_N_THREADS=6
      - LLM_MODEL_PATH=/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
      - METRICS_PORT=8002
      - RAG_API_URL=http://rag:8002
      - REDIS_HOST=xnai_redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS_ENABLED=true
      - REDIS_CA_CERT_PATH=/tls/ca.crt
      - REDIS_SSL_CERT_REQS=none
      - HF_TOKEN=${HF_TOKEN:-}
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - POSTGRES_HOST=xnai_postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=xnai
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - CONFIG_PATH=/app/config.toml
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - HSA_OVERRIDE_GFX_VERSION=9.0.0
    secrets:
      - redis_password
      - api_key
    networks:
      - xnai_db_network
      - xnai_app_network
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    command: ["uvicorn", "XNAi_rag_app.api.entrypoint:app", "--host", "0.0.0.0", "--port", "8002", "--log-level", "info"]

  ui:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.chainlit
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: xnai-ui:latest
    container_name: xnai_chainlit_ui
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    tmpfs:
      - /app/logs:size=100m,mode=1777
    volumes:
      - ./config.toml:/app/config.toml:ro,Z,U
      - /media/arcana-novai/omega_library/omega-stack/models:/models:ro,Z,U
      - ./app/XNAi_rag_app:/app/XNAi_rag_app:ro,Z,U
      - ./assets:/app/assets:ro,Z,U
      - ./data/entities:/app/data/entities:Z,U
    environment:
      - OPENBLAS_CORETYPE=ZEN
      - OPENBLAS_NUM_THREADS=6
      - CHAINLIT_PORT=8001
      - CHAINLIT_NO_TELEMETRY=true
      - RAG_API_URL=http://xnai_rag_api:8002/xnai/api/v1
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LOG_DIR=/app/logs
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      rag:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    networks:
      - xnai_app_network
    ports:
      - "8001:8001"
    restart: unless-stopped
    command:
      - chainlit
      - run
      - XNAi_rag_app.ui.chainlit_app_unified.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"

  crawler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.crawl
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: xnai-crawler:latest
    container_name: xnai_crawler
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    volumes:
      - ./config.toml:/app/config.toml:ro,Z,U
      - ./library:/library:z,U
      - ../../knowledge_new:/knowledge:z,U
      - ./data/cache:/app/cache:Z,U
      - ./tls/ca.crt:/tls/ca.crt:ro,Z
      - /tmp/crawl4ai:/app/.crawl4ai:Z,U
      - /tmp/crawler_logs:/app/logs:Z,U
    environment:
      - OPENBLAS_CORETYPE=ZEN
      - N_THREADS=6
      - CRAWL4AI_NO_TELEMETRY=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS_ENABLED=${REDIS_TLS_ENABLED:-true}
      - REDIS_CA_CERT_PATH=/tls/ca.crt
      - REDIS_SSL_CERT_REQS=none
      - HF_TOKEN=${HF_TOKEN:-}
      - LIBRARY_PATH=/library
      - KNOWLEDGE_PATH=/knowledge
      - LOG_DIR=/app/logs
    depends_on:
      redis:
        condition: service_healthy
      rag:
        condition: service_healthy
    networks:
      - xnai_db_network
    restart: unless-stopped
    command: ["sh", "-c", "echo '🚀 Crawler service standby...' && while true; do sleep 3600; done"]

  curation_worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.curation_worker
    image: xnai-library-curator:latest
    container_name: xnai_library_curator
    init: true
    restart: on-failure
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_HOST=xnai_redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS_ENABLED=true
      - REDIS_CA_CERT_PATH=/tls/ca.crt
      - REDIS_SSL_CERT_REQS=none
      - HF_TOKEN=${HF_TOKEN:-}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@xnai_postgres:5432/xnai
      - LIBRARY_PATH=/library
      - KNOWLEDGE_PATH=/expert-knowledge
      - PYTHONPATH=/app
      - CONFIG_PATH=/app/config.toml
      - HSA_OVERRIDE_GFX_VERSION=9.0.0
    volumes:
      - ../../storage:/storage:Z,U
      - /media/arcana-novai/omega_library/omega-stack/models:/storage/models:ro,Z,U
      - ../../library:/library:z,U
      - ../../expert-knowledge:/expert-knowledge:z,U
      - ./tls/ca.crt:/tls/ca.crt:ro,Z
      - ../../app/config.toml:/app/config.toml:ro,Z,U
    networks:
      - xnai_db_network
    command: ["python3", "-m", "XNAi_rag_app.workers.library_curator"]

  mkdocs:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.docs
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: xnai-mkdocs:latest
    container_name: xnai_mkdocs
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.2'
    volumes:
      - ./mkdocs.yml:/workspace/mkdocs.yml:ro,Z,U
      - ./docs:/workspace/docs:ro,Z,U
      - ./docs-new:/workspace/docs-new:ro,Z,U
    environment:
      - OPENBLAS_CORETYPE=ZEN
      - N_THREADS=2
    networks:
      - xnai_db_network
    ports:
      - "8008:8000"
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        echo '🚀 Starting XNAi Foundation Docs...'
        cd /workspace && mkdocs serve --config-file mkdocs.yml --dev-addr=0.0.0.0:8000

  vikunja-db:
    image: postgres:16-alpine
    container_name: xnai_vikunja_db
    user: "1001:1001"
    restart: unless-stopped
    environment:
      POSTGRES_USER: vikunja
      POSTGRES_PASSWORD: ${VIKUNJA_DB_PASSWORD:?VIKUNJA_DB_PASSWORD must be set}
      POSTGRES_DB: vikunja
    volumes:
      - ./data/vikunja/db:/var/lib/postgresql/data:Z,U
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vikunja"]
      start_period: 30s
    networks:
      - xnai_db_network

  vikunja:
    image: vikunja/vikunja:latest
    container_name: xnai_vikunja
    user: "1000:1000"

    restart: unless-stopped
    depends_on:
      vikunja-db:
        condition: service_healthy
    ports:
      - "3456:3456"
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: vikunja-db
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_DB_PASSWORD:?VIKUNJA_DB_PASSWORD must be set}
      VIKUNJA_DATABASE_DATABASE: vikunja
      VIKUNJA_SERVICE_PUBLICURL: http://localhost:8000/vikunja
      VIKUNJA_JWT_SECRET: ${VIKUNJA_JWT_SECRET:?VIKUNJA_JWT_SECRET must be set}
      VIKUNJA_CORS_ENABLE: "false"
      VIKUNJA_REDIS_ENABLED: "true"
      VIKUNJA_REDIS_HOST: redis:6379
      VIKUNJA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      VIKUNJA_REDIS_DB: "5"
    volumes:
      - ./data/vikunja/files:/app/vikunja/files:Z,U
    networks:
      - xnai_db_network

  caddy:
    image: caddy:2.8-alpine
    container_name: xnai_caddy
    user: "1000:1000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
    ports:
      - "8002:8000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z,U
      - ./logs/caddy:/var/log/caddy:Z,U
    networks:
      - xnai_app_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: xnai_grafana
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro,Z,U
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro,Z,U
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro,Z,U
      - grafana-data:/var/lib/grafana:Z,U
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
    networks:
      - xnai_db_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      victoriametrics:
        condition: service_healthy

  booklore:
    image: ghcr.io/booklore-app/booklore:latest
    container_name: xnai_booklore
    expose:
      - "8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./data/booklore:/config:Z,U
      - ./library/sorted:/books:z,U
      - ./library/bookdrop:/bookdrop:z,U
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    networks:
      - xnai_db_network
    restart: unless-stopped

  llama_server:
    image: localhost/xnai-rag:latest
    container_name: xnai_llama_server
    command: python3 -m llama_cpp.server --model /models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf --n_gpu_layers 0 --n_threads 6 --n_ctx 32768 --type_k 2 --type_v 2 --host 0.0.0.0 --port 8000 --api_key ${LLAMA_API_KEY:-xnai-local-key}
    volumes:
      - /media/arcana-novai/omega_library/omega-stack/models:/models:ro,Z,U
    environment:
      - N_THREADS=6
      - METRICS_PORT=8003
      - HSA_OVERRIDE_GFX_VERSION=9.0.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '2.0'
    networks:
      - xnai_db_network
    restart: unless-stopped
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: xnai_open_webui
    expose:
      - "8080"
    environment:
      - OPENAI_API_BASE_URL=http://xnai_llama_server:8000/v1
      - OPENAI_API_KEY=${LLAMA_API_KEY:-xnai-local-key}
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - ENABLE_PERSISTENT_CONFIG=False
    volumes:
      - ./data/open-webui:/app/backend/data:Z,U
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    networks:
      - xnai_db_network
    restart: unless-stopped
    depends_on:
      - llama_server

  knowledge_miner:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.curation_worker
    image: xnai-curation-worker:latest
    container_name: xnai_knowledge_miner
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    volumes:
      - ./app/XNAi_rag_app:/app/XNAi_rag_app:ro,Z,U
      - ./tls/ca.crt:/tls/ca.crt:ro,Z
      - ./scripts:/app/scripts:ro,Z,U
      - ./data/entities:/app/data/entities:Z,U
      - ./library:/library:z,U
      - ../../knowledge_new:/knowledge:z,U
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS_ENABLED=${REDIS_TLS_ENABLED:-true}
      - REDIS_CA_CERT_PATH=/tls/ca.crt
      - REDIS_SSL_CERT_REQS=none
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONPATH=/app:/app/scripts
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - xnai_db_network
    restart: unless-stopped
    command: ["python3", "-m", "XNAi_rag_app.workers.knowledge_miner"]

  memory-bank-mcp:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.memory-bank
    container_name: xnai_memory_bank_mcp
    init: true
    user: "1000:1000"
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@xnai_postgres:5432/xnai
      - REDIS_URL=rediss://xnai_redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS_ENABLED=true
      - REDIS_CA_CERT_PATH=/tls/ca.crt
      - REDIS_SSL_CERT_REQS=none
      - HF_TOKEN=${HF_TOKEN:-}
      - STORAGE_PATH=/storage
      - CONFIG_PATH=/app/config.toml
      - PYTHONPATH=/app
    volumes:
      - ../../storage:/storage:Z,U
      - ./tls/ca.crt:/tls/ca.crt:ro,Z
      - ../../app/config.toml:/app/config.toml:ro,Z,U
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - xnai_db_network
      - xnai_app_network
    restart: on-failure:5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.xnai.component=memory-bank-mcp"
      - "com.xnai.requires=redis"
      - "com.xnai.type=mcp-server"

  jaeger:
    image: jaegertracing/all-in-one:1.49
    container_name: xnai_jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - xnai_app_network
    restart: unless-stopped

  librarian:
    image: localhost/xnai-rag:latest
    container_name: xnai_librarian
    init: true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    environment:
      - REDIS_HOST=xnai_redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS_ENABLED=true
      - REDIS_CA_CERT_PATH=/tls/ca.crt
      - REDIS_SSL_CERT_REQS=none
      - PYTHONPATH=/app
      - CONFIG_PATH=/app/config.toml
      - HSA_OVERRIDE_GFX_VERSION=9.0.0
      - SESSION_ARCHIVE_DIR=/storage/recall/archives
    volumes:
      - ../../storage:/storage:Z,U
      - ./tls/ca.crt:/tls/ca.crt:ro,Z
      - ../../app/config.toml:/app/config.toml:ro,Z,U
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - xnai_db_network
    restart: unless-stopped
    command: ["python3", "-m", "XNAi_rag_app.workers.librarian"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0) if os.path.exists('/storage/recall/archives') else exit(1)"]
      interval: 60s
      timeout: 10s
      retries: 3

networks:
  xnai_db_network:
    name: xnai_db_network
    internal: true
  xnai_app_network:
    name: xnai_app_network

volumes:
  huggingface_cache:
    name: xnai_huggingface_cache
  victoriametrics-data:
    name: xnai_victoriametrics_data
  grafana-data:
    name: xnai_grafana_data
  booklore-config:
    name: xnai_booklore_config
  open-webui-data:
    name: xnai_open_webui_data

secrets:
  redis_password:
    file: ../../secrets/redis_password.txt
  api_key:
    file: ../../secrets/api_key.txt
