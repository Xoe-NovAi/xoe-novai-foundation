# Model Routing Configuration
model_routing:
  enabled: true
  strategies:
    performance_based:
      name: "Performance Based"
      description: "Route based on model performance metrics"
      algorithm: "weighted_score"
      weights:
        accuracy: 0.4
        speed: 0.3
        cost: 0.2
        reliability: 0.1
    
    task_specific:
      name: "Task Specific"
      description: "Route based on task type and model capabilities"
      rules:
        coding:
          primary: "claude-sonnet-4-6"
          fallback: ["gpt-5-1-codex-32k", "gemini-3-pro-preview"]
        analysis:
          primary: "gemini-3-pro-preview"
          fallback: ["kimi-k2-5-free", "glm-5-free"]
        creative:
          primary: "claude-opus-4-6-thinking"
          fallback: ["minimax-m2-5-free", "gemini-3-flash-preview"]
        general:
          primary: "gpt-5-mini"
          fallback: ["gemini-2.5-flash", "kimi-k2-5-free"]

# Documentation Management
documentation:
  enabled: true
  auto_generation: true
  update_frequency: "weekly"
  
  # Documentation categories
  categories:
    - name: "model-reference"
      path: "docs/03-reference/models/"
      template: "model-reference-template.md"
      auto_update: true
    
    - name: "cli-integration"
      path: "docs/03-how-to-guides/cli-integration/"
      template: "cli-integration-template.md"
      auto_update: true
    
    - name: "performance-benchmarks"
      path: "docs/03-reference/benchmarks/"
      template: "benchmark-template.md"
      auto_update: false

# Performance Tracking
performance_tracking:
  enabled: true
  metrics:
    - "response_time"
    - "accuracy_score"
    - "cost_per_token"
    - "success_rate"
    - "memory_usage"
  
  collection_interval: 3600  # 1 hour
  retention_days: 90
  alert_thresholds:
    response_time: 30
    accuracy_score: 0.8
    success_rate: 0.95

# Integration with CLI-Service Bridge
cli_service_bridge:
  enabled: true
  bridge_url: "http://localhost:8080/api/v1"
  task_types:
    - "model-routing"
    - "performance-monitoring"
    - "documentation-generation"
  
  # Model availability monitoring
  availability_monitoring:
    enabled: true
    check_interval: 300  # 5 minutes
    alert_on_failure: true

# Security and Compliance
security:
  enabled: true
  model_validation: true
  api_key_management: true
  audit_logging: true
  
  # Compliance tracking
  compliance:
    enabled: true
    requirements:
      - "data-privacy"
      - "model-transparency"
      - "usage-tracking"

# Environment variable overrides
# ==============================
# These can be overridden via environment variables:
# MODEL_ROUTING_ENABLED=true
# MODEL_ROUTING_STRATEGY=performance_based
# PERFORMANCE_TRACKING_ENABLED=true
# CLI_SERVICE_BRIDGE_ENABLED=true
# CLI_SERVICE_BRIDGE_URL=http://localhost:8080