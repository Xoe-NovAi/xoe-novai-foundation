# opencode.conf - OpenCode-specific dispatcher configuration
TOOL_NAME="opencode"
TOOL_BINARY="$(command -v opencode || echo "opencode")"
INSTANCE_ROOT="/tmp/xnai-instances"

set_tool_env() {
    export XDG_DATA_HOME="${INSTANCE_ROOT}/instance-${INSTANCE_ID}/opencode/.local/share"
    export XDG_CONFIG_HOME="${INSTANCE_ROOT}/instance-${INSTANCE_ID}/opencode"
    export OPENCODE_CONFIG="${XDG_CONFIG_HOME}/opencode.json"
    
    # --- Memory Optimization (Metropolis v2) ---
    # Fix for OpenCode OOM issues in Node.js heap
    # Setting to 2GB based on available system memory (6.6GB total)
    export NODE_OPTIONS="--max-old-space-size=2048"
    
    # Ensure isolation directories exist
    mkdir -p "$XDG_DATA_HOME" "$XDG_CONFIG_HOME"
}

pre_hook() {
    # Ensure opencode.json exists in instance config
    local MASTER_CONFIG="${OMEGA_ROOT}/.opencode/opencode.json"
    if [[ -f "$MASTER_CONFIG" && ! -f "$OPENCODE_CONFIG" ]]; then
        cp "$MASTER_CONFIG" "$OPENCODE_CONFIG"
    fi
}
