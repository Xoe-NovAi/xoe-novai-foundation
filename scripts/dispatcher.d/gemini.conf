# gemini.conf - Gemini-specific dispatcher configuration
TOOL_NAME="gemini"
TOOL_BINARY="${HOME}/.nvm/versions/node/v25.3.0/bin/gemini"
# Fallback to persistent storage if INSTANCE_ROOT is not set in environment
INSTANCE_ROOT="${INSTANCE_ROOT:-${HOME}/Documents/Xoe-NovAi/omega-stack/storage/instances}"

set_tool_env() {
    if [[ "$INSTANCE_ID" == "0" ]]; then
        export GEMINI_CLI_HOME="${INSTANCE_ROOT}/general/gemini-cli"
    else
        export GEMINI_CLI_HOME="${INSTANCE_ROOT}/facets/instance-${INSTANCE_ID}/gemini-cli"
    fi
    export GEMINI_CLI_SYSTEM_SETTINGS_PATH="${HOME}/.config/gemini/settings.json"
    mkdir -p "$GEMINI_CLI_HOME"
}

pre_hook() {
    # Expert Soul Injection
    SOUL_FILE="${GEMINI_CLI_HOME}/.gemini/expert_soul.md"
    if [[ -f "$SOUL_FILE" ]]; then
        export GEMINI_CUSTOM_INSTRUCTIONS="$(cat "$SOUL_FILE")"
    fi

    # Link/Copy MCP Config
    SHARED_MCP="${HOME}/.config/gemini/mcp_config.json"
    INST_MCP="${GEMINI_CLI_HOME}/.gemini/mcp_config.json"
    if [[ -f "$SHARED_MCP" ]]; then
        mkdir -p "${GEMINI_CLI_HOME}/.gemini"
        # FIX: Only copy if they aren't the same file to silence warnings
        if ! [[ "$SHARED_MCP" -ef "$INST_MCP" ]]; then
            cp "$SHARED_MCP" "$INST_MCP"
        fi
    fi

    # HARDENING: Resource Constraints for Facets
    # Prevents combined overhead of 8 facets from overwhelming RAM
    # NOTE: 512 caused OOM with large session files + MCP.
    # 1024 gives headroom while still protecting the 6GB system.
    export NODE_OPTIONS="--max-old-space-size=1024"
    export UV_THREADPOOL_SIZE=4
}
