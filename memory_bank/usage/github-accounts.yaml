# Current status summary
current_status:
  total_accounts: 7
  active_for_use: 2  # admin + arcananovaai
  ready_after_reset: 5
  total_messages_available: 350
  total_messages_used: 25
  total_messages_remaining: 325
  split_test_ready: true
  recommended_account: "arcananovaai@gmail.com"  # 50% remaining, fresh

# Rotation strategy
rotation_strategy:
  method: "lowest-usage-first"
  auto_switch: true
  warning_threshold: 40  # Switch when below 40% remaining
  exhaustion_threshold: 10  # Force switch when below 10%
  split_test_priority: "arcananovaai"  # Use this account first for split test

# Integration with existing quota system
integration:
  quota_auditor_script: "scripts/xnai-quota-audit.py"
  github_audit_script: "scripts/github-account-audit.py"
  dispatch_log: "memory_bank/usage/DISPATCH-LOG.json"
  copilot_usage: "memory_bank/usage/copilot-usage.json"
  github_usage: "memory_bank/usage/github-audit.json"
  modular_system: "scripts/account_management/"

# Commands reference
commands:
  # Check authentication status
  check_auth: "gh auth status"
  
  # Switch account
  switch_account: "gh auth switch --user <username>"
  
  # Run audit
  run_audit: "python3 scripts/github-account-audit.py --save"
  
  # Check rate limits
  check_limits: "gh api rate_limit"
  
  # Split test - use arcananovaai
  split_test: "gh auth switch --user arcananovaai && copilot -m raptor-mini-preview '...'"

# Next reset dates
expected_resets:
  all_accounts: "2026-03-01T00:00:00Z"
  note: "Most free tier accounts reset on 1st of month. Run github-account-audit.py to get exact times."
