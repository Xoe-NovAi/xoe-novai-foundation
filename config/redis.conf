# Redis Configuration for XNAi Foundation
# Version: 1.0.0
# Generated: 2026-02-25

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================

# Maximum memory Redis can use (2GB default for production)
# Adjust based on deployment tier:
# - Development: 512mb
# - Staging: 1gb
# - Production: 8gb-16gb
maxmemory 2gb

# Eviction policy: Remove oldest accessed keys when max memory reached
# Options: noeviction, allkeys-lru, volatile-lru, allkeys-random,
#          volatile-random, volatile-ttl, allkeys-lfu, volatile-lfu
maxmemory-policy allkeys-lru

# Number of keys sampled for LRU eviction (accuracy vs CPU trade-off)
# Lower = faster, less accurate; Higher = slower, more accurate
maxmemory-samples 5

# ============================================================================
# PERSISTENCE
# ============================================================================

# RDB (Redis Database Backup) - Point-in-time snapshots
# For non-critical cache: Comment out for no persistence
# For critical data: Enable with appropriate timing
save 900 1      # Save after 900s if 1+ keys changed
save 300 10     # Save after 300s if 10+ keys changed
save 60 10000   # Save after 60s if 10000+ keys changed

# Dump filename for RDB backups
dbfilename dump.rdb

# Directory for RDB and AOF files
dir /data

# Append-only file (AOF) - Continuous append log
# Disable for cache-only use (performance); Enable for persistent state
appendonly no

# AOF fsync policy: always, everysec, no
# - always: Fsync after every write (safest, slowest)
# - everysec: Fsync every second (default, good balance)
# - no: Fsync controlled by OS (fastest, least safe)
appendfsync everysec

# Compress AOF when it reaches specific size reduction %
aof-rewrite-min-size 64mb
aof-rewrite-percentage 100

# ============================================================================
# REPLICATION (if using master-slave setup)
# ============================================================================

# For replica nodes only:
# replicaof redis-primary 6379
# replica-read-only yes
# replica-priority 100
# slave-serve-stale-data yes

# Replication backlog buffer (for partial resync)
repl-backlog-size 16mb
repl-backlog-ttl 3600

# ============================================================================
# KEYSPACE NOTIFICATIONS
# ============================================================================

# Enable key expiration events for cache invalidation
# Flags:
# - K: Key events
# - E: Expiration events
# - x: Expired event
# - $: String commands
# - l: List commands
# - s: Set commands
# - z: Sorted set commands
# - h: Hash commands
notify-keyspace-events "Ex"

# ============================================================================
# CLIENT CONNECTIONS
# ============================================================================

# Max concurrent clients
maxclients 10000

# Timeout for idle clients (seconds, 0 = no timeout)
timeout 0

# TCP keep-alive
tcp-keepalive 300

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# Number of databases (0-15)
databases 16

# For better responsiveness with high throughput:
# Disable active defragmentation if latency-sensitive
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no

# Lua script timeout (milliseconds)
lua-time-limit 5000

# ============================================================================
# SECURITY
# ============================================================================

# Password authentication (if needed)
# requirepass yourpassword

# Disable dangerous commands in production:
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command KEYS ""

# ============================================================================
# LOGGING
# ============================================================================

# Log level: debug, verbose, notice, warning
loglevel notice

# Log file (empty = stdout)
logfile ""

# System log (for Docker/Kubernetes)
# Logs to /proc/self/fd/1 (stdout) by default

# ============================================================================
# SLOWLOG
# ============================================================================

# Log queries slower than this (microseconds)
slowlog-log-slower-than 10000

# Max entries in slow log
slowlog-max-len 128

# ============================================================================
# ADVANCED
# ============================================================================

# Use jemalloc for memory efficiency
# (Compiled in by default; compile with --disable-jemalloc to disable)

# Disable TLS for internal networks (Docker containers)
# port 6379

# Disable protected mode if using with Docker network
protected-mode no

# ============================================================================
# RECOMMENDED SETTINGS FOR XNAI FOUNDATION
# ============================================================================

# Cache-optimized profile
# (Uncomment below to use, comment out above as needed)

# For document cache + session + embedding vectors:
# maxmemory 4gb
# maxmemory-policy allkeys-lru
# maxmemory-samples 5
# save ""                    # Disable RDB (cache)
# appendonly no              # Disable AOF (cache)
# lazy-free-on-eviction no
# notify-keyspace-events "Ex"
