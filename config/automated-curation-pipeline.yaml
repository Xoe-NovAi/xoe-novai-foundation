# Automated Curation Pipeline Configuration
# ==========================================
# Configuration for 24/7 background content discovery and processing

pipeline:
  enabled: true
  max_concurrent_sources: 5
  max_queue_size: 1000
  processing_timeout: 300
  retry_attempts: 3
  retry_delay: 60
  health_check_interval: 60

sources:
  web:
    enabled: true
    max_pages_per_source: 10
    crawl_depth: 2
    user_agent: "XNAi-Curation-Bot/1.0"
    rate_limit: 10
    timeout: 30
  
  rss:
    enabled: true
    max_items_per_feed: 20
    update_interval: 30
    timeout: 30
  
  file:
    enabled: true
    watch_directories:
      - "./watched_files/"
      - "./downloads/"
    supported_extensions:
      - ".pdf"
      - ".docx"
      - ".doc"
      - ".txt"
      - ".md"
      - ".epub"
    check_interval: 10
  
  api:
    enabled: true
    rate_limit: 100
    timeout: 30
    max_concurrent: 5

processing:
  ocr_enabled: true
  text_extraction: true
  summarization: true
  tagging: true
  translation: false
  language_detection: true
  duplicate_detection: true
  
  filters:
    min_content_length: 50
    max_content_length: 50000
    allowed_languages: ["en", "zh", "fr", "de", "es", "ja"]
    blocked_keywords: ["spam", "advertisement", "malware"]

storage:
  memory_bank_integration: true
  qdrant_integration: true
  local_storage: true
  storage_path: "curated_content/"
  
  retention:
    local_files: 30  # days
    processed_content: 90  # days
    metadata_only: 365  # days

model_integration:
  enabled: true
  summarization_model: "google/antigravity-claude-sonnet-4-6"
  tagging_model: "opencode/minimax-m2.5-free"
  translation_model: "google/antigravity-gemini-3-pro"
  fallback_strategy: "performance_based"

monitoring:
  enabled: true
  metrics_collection: true
  alert_thresholds:
    error_rate: 0.05
    queue_size_warning: 500
    queue_size_critical: 800
    processing_time_warning: 120
    processing_time_critical: 300
  
  notifications:
    enabled: false
    email: ""
    webhook: ""

security:
  enabled: true
  content_validation: true
  url_whitelist: []
  url_blacklist:
    - "*.malware.com"
    - "*.phishing.org"
  file_size_limit: 50  # MB

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/automated-curation-pipeline.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5
  console_output: true

# Content Sources Configuration
content_sources:
  tech_news:
    name: "Tech News Aggregator"
    type: "web"
    url: "https://techcrunch.com"
    enabled: true
    interval_minutes: 60
    priority: "high"
    filters:
      keywords: ["AI", "ML", "tech", "programming", "software"]
      min_content_length: 100
  
  ai_research:
    name: "AI Research Papers"
    type: "web"
    url: "https://arxiv.org"
    enabled: true
    interval_minutes: 120
    priority: "medium"
    filters:
      keywords: ["machine learning", "artificial intelligence", "deep learning", "neural networks"]
      min_content_length: 200
  
  hacker_news:
    name: "Hacker News RSS"
    type: "rss"
    url: "https://hnrss.org/frontpage"
    enabled: true
    interval_minutes: 30
    priority: "high"
    filters:
      keywords: ["programming", "tech", "startup", "security"]
  
  ai_weekly:
    name: "AI Weekly Newsletter"
    type: "rss"
    url: "https://aiweekly.co/feed/"
    enabled: true
    interval_minutes: 60
    priority: "medium"
    filters:
      keywords: ["AI", "machine learning", "data science", "research"]
  
  local_documents:
    name: "Local Document Watcher"
    type: "file"
    url: "./watched_files/"
    enabled: true
    interval_minutes: 10
    priority: "low"
    filters:
      extensions: [".pdf", ".docx", ".txt", ".md"]
      min_file_size: 1024  # bytes

# Environment variable overrides
# ==============================
# These can be overridden via environment variables:
# CURATION_PIPELINE_ENABLED=true
# CURATION_PIPELINE_MAX_CONCURRENT=10
# CURATION_PIPELINE_LOG_LEVEL=DEBUG
# CURATION_PIPELINE_STORAGE_PATH=/custom/path