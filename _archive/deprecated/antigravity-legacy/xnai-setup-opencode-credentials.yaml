# OpenCode Multi-Account Configuration Template
# ===============================================
# 
# This file contains the configuration for multiple OpenCode accounts
# to enable free tier usage limit remediation through account rotation.
#
# Usage:
# 1. Copy this template to ~/.config/xnai/opencode-credentials.yaml
# 2. Replace placeholder values with actual credentials
# 3. Set secure permissions: chmod 0600 ~/.config/xnai/opencode-credentials.yaml
# 4. Use with xnai-inject-credentials.sh for credential injection

credentials:
  opencode:
    # Multi-account OpenCode setup (supports 8+ concurrent instances)
    # XDG_DATA_HOME Override Pattern (for multi-instance isolation)
    # Usage: XDG_DATA_HOME=/tmp/opencode-instance-1 opencode serve --port 10001
    # Each instance gets isolated auth.json, preventing credential collision
    
    accounts:
      account_1:
        name: "OpenCode Account 1"
        email: "user1@example.com"  # Replace with actual email
        api_key: "${OPENCODE_API_KEY_1}"  # Use environment variable or replace directly
        xdg_data_home: "/tmp/xnai-opencode-instance-1"
        port: 10001
        status: "active"
        
      account_2:
        name: "OpenCode Account 2"
        email: "user2@example.com"  # Replace with actual email
        api_key: "${OPENCODE_API_KEY_2}"  # Use environment variable or replace directly
        xdg_data_home: "/tmp/xnai-opencode-instance-2"
        port: 10002
        status: "active"
        
      account_3:
        name: "OpenCode Account 3"
        email: "user3@example.com"  # Replace with actual email
        api_key: "${OPENCODE_API_KEY_3}"  # Use environment variable or replace directly
        xdg_data_home: "/tmp/xnai-opencode-instance-3"
        port: 10003
        status: "active"
        
      account_4:
        name: "OpenCode Account 4"
        email: "user4@example.com"  # Replace with actual email
        api_key: "${OPENCODE_API_KEY_4}"  # Use environment variable or replace directly
        xdg_data_home: "/tmp/xnai-opencode-instance-4"
        port: 10004
        status: "active"
        
      account_5:
        name: "OpenCode Account 5"
        email: "user5@example.com"  # Replace with actual email
        api_key: "${OPENCODE_API_KEY_5}"  # Use environment variable or replace directly
        xdg_data_home: "/tmp/xnai-opencode-instance-5"
        port: 10005
        status: "active"
        
      account_6:
        name: "OpenCode Account 6"
        email: "user6@example.com"  # Replace with actual email
        api_key: "${OPENCODE_API_KEY_6}"  # Use environment variable or replace directly
        xdg_data_home: "/tmp/xnai-opencode-instance-6"
        port: 10006
        status: "active"
        
      account_7:
        name: "OpenCode Account 7"
        email: "user7@example.com"  # Replace with actual email
        api_key: "${OPENCODE_API_KEY_7}"  # Use environment variable or replace directly
        xdg_data_home: "/tmp/xnai-opencode-instance-7"
        port: 10007
        status: "active"
        
      account_8:
        name: "OpenCode Account 8"
        email: "user8@example.com"  # Replace with actual email
        api_key: "${OPENCODE_API_KEY_8}"  # Use environment variable or replace directly
        xdg_data_home: "/tmp/xnai-opencode-instance-8"
        port: 10008
        status: "active"

    # Default settings for all accounts
    default:
      model: "minimax-m2.5-free"  # MiniMax m2.5 prime for working memory
      timeout: 300
      retry_attempts: 3
      retry_delay: 60

    # Rotation strategy
    rotation:
      enabled: true
      strategy: "round_robin"  # or "lowest_usage_first"
      check_interval: 300  # seconds
      fallback_chain: ["account_1", "account_2", "account_3", "account_4", "account_5", "account_6", "account_7", "account_8"]

  # Optional: Other providers can be added here
  # copilot:
  #   accounts: [...]
  # gemini:
  #   accounts: [...]

# Storage and isolation settings
storage_structure:
  opencode:
    lifetime_days: 30
    isolation: "xdg_data_home"
    database_per_instance: true
    auth_json_per_instance: true

# Provider refresh policies
provider_refresh_policies:
  opencode:
    auth_file_refresh: "on_startup"  # or "daily", "weekly"
    database_cleanup: "weekly"
    session_cleanup: "daily"

# Security settings
security:
  encryption: "none"  # or "gpg", "age" for encrypted credentials
  permissions: "0600"  # File permissions for credential files
  environment_variables: true  # Allow env var substitution

# Monitoring and logging
monitoring:
  enabled: true
  log_level: "INFO"
  audit_trail: true
  usage_tracking: true
  quota_monitoring: true

# Integration settings
integration:
  antigravity:
    enabled: true
    plugin: "opencode-antigravity-auth@latest"
    auth_type: "google_oauth"
    auth_config_path: "~/.config/opencode/antigravity-accounts.json"
    
  models:
    working_memory: "minimax-m2.5-free"  # Primary model for working memory
    fallback: "glm-5-free"
    premium: "google/antigravity-claude-opus-4-6-thinking"